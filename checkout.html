<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <style>
    body { font-family: sans-serif; margin: 40px; }
  </style>
</head>
<body>
  <h1>Opteme Checkout</h1>
  <p id="status">Preparing secure checkout...</p>

  <script>
    // Sandbox only:
    // Paddle.Environment.set("sandbox");

    Paddle.Initialize({
      token: "live_YOUR_CLIENT_SIDE_TOKEN",
      checkout: {
        settings: {
          displayMode: "overlay",
          theme: "light",
          locale: "en"
        }
      }
    });

    const hasTxn = new URLSearchParams(window.location.search).has("_ptxn");
    document.getElementById("status").textContent = hasTxn
      ? "Opening checkout..."
      : "No transaction found in URL.";
  </script>
</body>
</html>
