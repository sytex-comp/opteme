<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0b;
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .app-name {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .tagline {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 520px;
            margin: 0 auto;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="app-name">Checkout</h1>
        <p id="status" class="tagline">Preparing secure checkout...</p>
    </main>

    <script>
        const PADDLE_CLIENT_TOKEN = "live_9462949210d5841fcfefa2fad32";

        function setStatus(message) {
            document.getElementById("status").textContent = message;
        }

        function getTransactionId() {
            const params = new URLSearchParams(window.location.search);
            const keys = ["_ptxn", "ptxn", "transaction_id", "transaction"];
            for (const key of keys) {
                const value = params.get(key);
                if (value && value.startsWith("txn_")) {
                    return value;
                }
            }
            return null;
        }

        async function openCheckout() {
            const transactionId = getTransactionId();
            if (!transactionId) {
                setStatus("No transaction found in URL.\nExpected ?_ptxn=txn_...");
                return;
            }

            if (!PADDLE_CLIENT_TOKEN || PADDLE_CLIENT_TOKEN.includes("YOUR_CLIENT_SIDE_TOKEN")) {
                setStatus("Missing Paddle client token.\nSet PADDLE_CLIENT_TOKEN in checkout.html.");
                return;
            }

            try {
                Paddle.Initialize({
                    token: PADDLE_CLIENT_TOKEN,
                    checkout: {
                        settings: {
                            displayMode: "overlay",
                            theme: "light",
                            locale: "en"
                        }
                    }
                });

                setStatus("Opening checkout...");
                Paddle.Checkout.open({ transactionId });
            } catch (err) {
                console.error(err);
                // Fallback to direct transaction URL if JS init/open fails.
                window.location.href = "https://checkout.paddle.com/transaction/" + encodeURIComponent(transactionId);
            }
        }

        openCheckout();
    </script>
</body>
</html>
